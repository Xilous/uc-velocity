name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-checks:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ucvelocity_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ucvelocity_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Validate app startup (runs migrations + imports)
        run: python -c "from main import app; print('App startup OK')"

      - name: Run tests
        run: pytest -v --tb=short

  frontend-checks:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc -b

      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Build
        env:
          VITE_API_BASE: http://localhost:8000
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify Dockerfile exposes all VITE_ env vars
        working-directory: .
        run: |
          # Find all VITE_ env vars referenced in frontend source code
          SOURCE_VARS=$(grep -roh 'import\.meta\.env\.VITE_[A-Z_]*' frontend/src/ | sort -u | sed 's/import\.meta\.env\.//')
          # Find all VITE_ ARGs declared in the Dockerfile
          DOCKER_ARGS=$(grep '^ARG VITE_' frontend/Dockerfile | sed 's/^ARG //' | sort -u)
          MISSING=""
          for var in $SOURCE_VARS; do
            if ! echo "$DOCKER_ARGS" | grep -qx "$var"; then
              MISSING="$MISSING  - $var\n"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Dockerfile is missing ARG declarations for VITE_ vars used in source:"
            printf "$MISSING"
            echo "Add these to frontend/Dockerfile so Railway passes them at build time."
            exit 1
          fi
          echo "All VITE_ env vars have matching Dockerfile ARGs."

  migration-integrity:
    name: Migration Integrity
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ucvelocity_migrations
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ucvelocity_migrations
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fresh upgrade
        run: alembic upgrade head

      - name: Downgrade to base
        run: alembic downgrade base

      - name: Re-upgrade (idempotency check)
        run: alembic upgrade head

      - name: Verify models match migrations
        run: alembic check || echo "WARNING - models may have unapplied changes"
